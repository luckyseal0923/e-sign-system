<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>E-Sign 後台管理系統</title>
  <!-- 載入 Google Fonts Outfit & Noto Sans TC -->
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-gradient: radial-gradient(circle at 10% 20%, #17152b 0%, #0d0a14 90%);
      --card-bg: rgba(28, 22, 45, 0.65);
      --card-border: rgba(255, 255, 255, 0.08);
      --card-hover-border: rgba(167, 139, 250, 0.4);
      --input-bg: rgba(18, 13, 28, 0.8);
      --input-border: rgba(255, 255, 255, 0.12);
      
      --text-main: #f3f4f6;
      --text-sub: #cbd5e1;
      --text-muted: #8b5cf6; /* 紫色強調 */
      --text-dim: #94a3b8;
      
      --primary: #8b5cf6;
      --primary-hover: #7c3aed;
      --primary-glow: rgba(139, 92, 246, 0.35);
      
      --success: #10b981;
      --success-soft: rgba(16, 185, 129, 0.15);
      --warning: #f59e0b;
      --warning-soft: rgba(245, 158, 11, 0.15);
      --danger: #ef4444;
      --danger-soft: rgba(239, 68, 68, 0.15);
      --info: #3b82f6;
      --info-soft: rgba(59, 130, 246, 0.15);
      
      --shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 20px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Outfit", "Noto Sans TC", sans-serif;
      background: var(--bg-gradient);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
      position: relative;
    }

    /* 炫光背景效果 - 管理後台採用深紫與深紅 */
    .glow-bg {
      position: fixed;
      inset: 0;
      overflow: hidden;
      z-index: -1;
      pointer-events: none;
    }

    .glow-circle {
      position: absolute;
      border-radius: 50%;
      filter: blur(130px);
      opacity: 0.16;
    }

    .glow-circle-1 {
      top: -10%;
      right: -10%;
      width: 50vw;
      height: 50vw;
      background: #8b5cf6;
      animation: float-slow 20s infinite alternate;
    }

    .glow-circle-2 {
      bottom: -10%;
      left: -10%;
      width: 45vw;
      height: 45vw;
      background: #ec4899;
      animation: float-slow 25s infinite alternate-reverse;
    }

    @keyframes float-slow {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(6%, 5%) scale(1.15); }
    }

    .hidden {
      display: none !important;
    }

    /* ==========================================
       後台版面配置
       ========================================== */
    .admin-layout {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 32px;
      max-width: 1440px;
      width: 100%;
      margin: 0 auto;
    }

    /* 頂部導覽列 */
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      margin-bottom: 32px;
      flex-wrap: wrap;
    }

    .admin-title-group h1 {
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 6px;
      background: linear-gradient(135deg, #ffffff 30%, #ddd6fe 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .admin-badge {
      font-size: 11px;
      background: var(--danger-soft);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #fca5a5;
      padding: 2px 8px;
      border-radius: 4px;
      vertical-align: middle;
      font-weight: 800;
      letter-spacing: 0.5px;
    }

    .admin-title-group p {
      font-size: 14px;
      color: var(--text-dim);
    }

    .topbar-actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .user-profile {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(255, 255, 255, 0.05);
      padding: 8px 16px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.05);
      font-size: 14px;
    }

    .user-status-dot {
      width: 8px;
      height: 8px;
      background: #ef4444; /* 管理員以紅色指示 */
      border-radius: 50%;
      box-shadow: 0 0 8px #ef4444;
    }

    .btn-action {
      background: rgba(255, 255, 255, 0.08);
      color: var(--text-main);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 999px;
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn-action:hover {
      background: rgba(255, 255, 255, 0.15);
      border-color: rgba(255, 255, 255, 0.2);
    }

    .btn-action.btn-primary-action {
      background: var(--primary);
      border-color: var(--primary);
      box-shadow: 0 4px 12px var(--primary-glow);
    }

    .btn-action.btn-primary-action:hover {
      background: var(--primary-hover);
      box-shadow: 0 6px 16px var(--primary-glow);
      transform: translateY(-1px);
    }

    /* 數據統計面板 */
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(180px, 1fr));
      gap: 20px;
      margin-bottom: 32px;
    }

    .summary-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: var(--radius-md);
      padding: 24px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      transition: transform 0.3s, border-color 0.3s;
    }

    .summary-card:hover {
      transform: translateY(-2px);
      border-color: var(--card-hover-border);
    }

    .summary-label {
      color: var(--text-dim);
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .summary-value {
      font-size: 32px;
      font-weight: 800;
      margin-bottom: 8px;
      line-height: 1;
      background: linear-gradient(to right, #fff, #ddd6fe);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .summary-note {
      font-size: 12px;
      color: var(--text-dim);
      line-height: 1.5;
    }

    /* 管理看板主面 */
    .panel {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      padding: 28px;
    }

    .panel-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .panel-title {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: 0.5px;
    }

    .filters {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .search-input {
      min-width: 320px;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      font-size: 14px;
      color: var(--text-main);
      transition: all 0.25s;
    }

    .search-input:focus {
      border-color: var(--primary);
      outline: none;
    }

    .select-filter {
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      font-size: 14px;
      color: var(--text-main);
      min-width: 140px;
      cursor: pointer;
      transition: all 0.25s;
    }

    .select-filter:focus {
      border-color: var(--primary);
      outline: none;
    }

    /* 案件列表表格 */
    .table-wrap {
      overflow-x: auto;
      border-radius: var(--radius-sm);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 1020px;
    }

    th, td {
      padding: 16px 20px;
      text-align: left;
      vertical-align: middle;
      font-size: 14px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    th {
      font-size: 12px;
      font-weight: 700;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      background: rgba(255, 255, 255, 0.02);
      position: sticky;
      top: 0;
      z-index: 1;
    }

    tr:hover td {
      background: rgba(255, 255, 255, 0.015);
    }

    .case-code {
      font-family: monospace;
      font-weight: 700;
      color: #fff;
      font-size: 14px;
      margin-bottom: 4px;
      letter-spacing: 0.5px;
    }

    .case-name {
      color: var(--text-sub);
      font-size: 13px;
    }

    .staff-badge {
      display: inline-block;
      font-size: 11px;
      color: var(--text-dim);
      background: rgba(255, 255, 255, 0.06);
      padding: 1px 6px;
      border-radius: 4px;
      margin-top: 4px;
      font-family: monospace;
    }

    /* 狀態標籤 */
    .pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .pill.created { background: var(--info-soft); color: var(--info); border: 1px solid rgba(59, 130, 246, 0.25); }
    .pill.signing { background: var(--warning-soft); color: var(--warning); border: 1px solid rgba(245, 158, 11, 0.25); }
    .pill.done { background: var(--success-soft); color: var(--success); border: 1px solid rgba(16, 185, 129, 0.25); }
    .pill.cancel { background: var(--danger-soft); color: var(--danger); border: 1px solid rgba(239, 68, 68, 0.25); }
    .pill.pending { background: rgba(255, 255, 255, 0.08); color: var(--text-dim); }

    /* 進度條 */
    .progress-box {
      min-width: 160px;
    }

    .progress-top {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      font-size: 11px;
      color: var(--text-dim);
      margin-bottom: 6px;
    }

    .progress-bar {
      width: 100%;
      height: 6px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--primary) 0%, var(--success) 100%);
      border-radius: 999px;
      transition: width 0.4s ease;
    }

    .row-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .mini-btn {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.05);
      color: var(--text-main);
      border-radius: var(--radius-sm);
      padding: 7px 12px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .mini-btn:hover {
      background: rgba(255, 255, 255, 0.12);
      border-color: rgba(255, 255, 255, 0.15);
      color: #fff;
    }

    .mini-btn.btn-expand {
      background: rgba(139, 92, 246, 0.1);
      border-color: rgba(139, 92, 246, 0.15);
      color: #c084fc;
    }

    .mini-btn.btn-expand:hover {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
      box-shadow: 0 4px 10px rgba(139, 92, 246, 0.25);
    }

    .mini-btn.btn-close-case {
      color: #f59e0b;
      border-color: rgba(245, 158, 11, 0.3);
      background: rgba(245, 158, 11, 0.06);
    }

    .mini-btn.btn-close-case:hover {
      background: #f59e0b;
      color: #000;
      border-color: #f59e0b;
    }

    .mini-btn.btn-delete-case {
      color: #ef4444;
      border-color: rgba(239, 68, 68, 0.3);
      background: rgba(239, 68, 68, 0.06);
    }

    .mini-btn.btn-delete-case:hover {
      background: #ef4444;
      color: #fff;
      border-color: #ef4444;
      box-shadow: 0 4px 10px rgba(239, 68, 68, 0.25);
    }

    /* 子任務細節 */
    .child-row {
      background: rgba(255, 255, 255, 0.01);
    }

    .child-row td {
      padding: 0;
    }

    .child-wrap {
      padding: 16px 20px 24px 32px;
      border-left: 3px solid var(--primary);
      background: rgba(0, 0, 0, 0.15);
    }

    .child-list {
      display: grid;
      gap: 12px;
    }

    .child-item {
      display: grid;
      grid-template-columns: minmax(180px, 1.2fr) minmax(110px, 0.7fr) minmax(180px, 1fr) auto;
      gap: 16px;
      align-items: center;
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: var(--radius-md);
      background: rgba(255, 255, 255, 0.02);
      padding: 14px 20px;
    }

    .child-item:hover {
      border-color: rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.03);
    }

    .child-name {
      font-size: 14px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 3px;
    }

    .child-code {
      font-size: 11px;
      color: var(--text-dim);
      font-family: monospace;
      word-break: break-all;
    }

    .child-status {
      display: flex;
      align-items: center;
    }

    .child-meta {
      font-size: 12px;
      color: var(--text-dim);
    }

    .child-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }

    .empty {
      text-align: center;
      color: var(--text-dim);
      padding: 48px 20px;
      font-size: 14px;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 32px;
      transform: translateX(-50%) translateY(120px);
      background: rgba(15, 23, 42, 0.9);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #fff;
      padding: 12px 24px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 600;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
      transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      z-index: 10001;
      max-width: 90vw;
      text-align: center;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
    }

    /* ==========================================
       響應式設計 (Responsive Design)
       ========================================== */
    @media (max-width: 1200px) {
      .summary-grid {
        grid-template-columns: repeat(2, minmax(180px, 1fr));
      }
    }

    @media (max-width: 900px) {
      .admin-layout {
        padding: 20px;
      }
      .summary-grid {
        grid-template-columns: 1fr;
      }
      .child-item {
        grid-template-columns: 1fr;
        gap: 12px;
        align-items: flex-start;
      }
      .child-actions {
        justify-content: flex-start;
        width: 100%;
        margin-top: 4px;
      }
      .topbar {
        flex-direction: column;
        align-items: flex-start;
      }
      .topbar-actions {
        width: 100%;
        justify-content: space-between;
      }
    }
  </style>
</head>
<body>

  <!-- 氛圍炫光背景 -->
  <div class="glow-bg">
    <div class="glow-circle glow-circle-1"></div>
    <div class="glow-circle glow-circle-2"></div>
  </div>

  <div class="admin-layout" id="adminWrapper">
    <header class="topbar">
      <div class="admin-title-group">
        <h1>E-Sign 遠端簽核管理後台 <span class="admin-badge">ADMIN</span></h1>
        <p>系統管理員全覽看板，監控全院簽核進度、手動結案、刪除案件等特權操作</p>
      </div>
      <div class="topbar-actions">
        <div class="user-profile">
          <div class="user-status-dot"></div>
          <span id="userNameBadge">系統管理員</span>
        </div>
        <button class="btn-action" onclick="goToTaskboard()">返回同仁看板</button>
        <button class="btn-action btn-primary-action" onclick="goToCreateCase()">發起新案件</button>
        <button class="btn-action" onclick="handleLogout()">登出</button>
      </div>
    </header>

    <!-- 數據統計區 -->
    <section class="summary-grid" id="summaryGrid"></section>

    <!-- 列表面板 -->
    <section class="panel">
      <div class="panel-head">
        <h2 class="panel-title">全系統案件全覽列表</h2>
        <div class="filters">
          <input id="searchInput" class="search-input" type="text" placeholder="搜尋案件編號 / 案件名稱 / 員編 / 起單人">
          <select id="statusFilter" class="select-filter">
            <option value="">全部狀態</option>
            <option value="已建立">已建立</option>
            <option value="簽署中">簽署中</option>
            <option value="已完成">已完成 / 已結案</option>
            <option value="已作廢">已作廢</option>
          </select>
        </div>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>案件資訊</th>
              <th>起單同仁</th>
              <th>建立時間</th>
              <th>狀態</th>
              <th>簽署進度</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="caseTableBody">
            <tr>
              <td colspan="6" class="empty">資料載入中...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </div>

  <!-- Toast 訊息通知 -->
  <div class="toast" id="toast">已更新</div>

  <script type="module">
    import { supabase } from './supabase-config.js';

    // 儲存狀態變數
    let casesList = [];
    const userNameBadge = document.getElementById('userNameBadge');
    
    const summaryGrid = document.getElementById('summaryGrid');
    const caseTableBody = document.getElementById('caseTableBody');
    const searchInput = document.getElementById('searchInput');
    const statusFilter = document.getElementById('statusFilter');

    // 檢查登入與角色 Session
    document.addEventListener('DOMContentLoaded', () => {
      checkAdminSession();
    });

    function checkAdminSession() {
      const staffId = sessionStorage.getItem('user_staff_id');
      const role = sessionStorage.getItem('user_role');
      const name = sessionStorage.getItem('user_name');

      if (!staffId || role !== 'admin') {
        // 未登入或非管理員，強制送回 login (taskboard.html)
        alert('此頁面僅供管理人員訪問，請先使用管理員帳密登入！');
        window.location.href = 'taskboard.html';
      } else {
        userNameBadge.textContent = `${name} (${staffId}) 管理員`;
        loadCasesFromSupabase();
      }
    }

    // 登出處理
    function handleLogout() {
      sessionStorage.clear();
      showToast('已安全登出');
      setTimeout(() => {
        window.location.href = 'taskboard.html';
      }, 500);
    }

    // 跳轉
    function goToTaskboard() {
      // 暫時將 Session 中的 role 改為 user 以免循環跳轉，但為了測試方便，我們只做頁面跳轉
      // 員工看板會自動判斷如果 session.role 是 admin 則會再轉回 admin.html，所以這裡跳轉要小心。
      // 為解決這個問題，我們可以直接清除 sessionStorage role，或者在 taskboard.html 的 checkSession 中如果角色是 admin，
      // 但附帶參數 `mode=view`，則允許檢視。
      // 最乾淨的方法是：將 role 設成 user，或者就單純返回 taskboard.html 且在 taskboard 中若有 admin 身分，允許他在頂部切換回 admin.html。
      // 讓我們在 taskboard.html 中實作這段：如果 session.role === 'admin'，但在 url 有 view_mode 的話就不強制跳轉。
      // 或是直接跳轉到 taskboard.html?view=1。
      window.location.href = 'taskboard.html?view=1';
    }

    function goToCreateCase() {
      window.location.href = 'index.html';
    }

    // 訊息通知
    function showToast(message) {
      const toast = document.getElementById('toast');
      if (toast) {
        toast.textContent = message;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2200);
      }
    }

    // 載入 Supabase 所有案件資料
    async function loadCasesFromSupabase() {
      try {
        // 管理員：撈取系統中所有人的案件
        const { data: casesData, error: casesError } = await supabase
          .from('cases')
          .select('*')
          .order('created_at', { ascending: false });
        
        if (casesError) throw casesError;

        // 撈取所有子任務
        const { data: childTasksData, error: tasksError } = await supabase
          .from('child_tasks')
          .select('*');
        
        if (tasksError) throw tasksError;

        casesList = (casesData || []).map(c => {
          const childTasks = (childTasksData || [])
            .filter(t => t.case_id === c.case_id)
            .sort((a, b) => a.seq - b.seq)
            .map(t => ({
              signId: t.sign_id,
              caseId: t.case_id,
              seq: t.seq,
              signerName: t.signer_name,
              status: t.status,
              signedAt: t.signed_at,
              signUrl: `${window.location.origin}${window.location.pathname.replace(/[^/]+$/, 'signtask.html')}?token=${t.access_token}`,
              signaturePath: t.signature_path
            }));

          return {
            caseId: c.case_id,
            caseName: c.case_name,
            applicantName: c.applicant_name,
            createdAt: c.created_at,
            status: c.status,
            signCount: c.sign_count,
            staffId: c.staff_id,
            birthDate: c.birth_date,
            password: c.password,
            childTasks: childTasks
          };
        });

        filterCases();

      } catch (err) {
        console.error(err);
        showToast(`資料載入失敗: ${err.message}`);
      }
    }

    // 狀態歸類輔助函數
    function getChildTaskDisplayStatus(task) {
      return (task.status === '已完成' || task.status === '簽署完成' || !!task.signedAt) ? '簽署完成' : '待簽署';
    }

    function getDoneCount(item) {
      return item.childTasks.filter(task => getChildTaskDisplayStatus(task) === '簽署完成').length;
    }

    function getPendingCount(item) {
      return item.childTasks.filter(task => getChildTaskDisplayStatus(task) === '待簽署').length;
    }

    function getProgress(item) {
      if (!item.signCount) return 0;
      return Math.round((getDoneCount(item) / item.signCount) * 100);
    }

    function getStatusClass(status) {
      if (status === '已建立') return 'created';
      if (status === '簽署中') return 'signing';
      if (['已完成', '簽署完成', '已結案'].includes(status)) return 'done';
      if (status === '已作廢') return 'cancel';
      return 'pending';
    }

    function getDisplayStatus(item) {
      const progress = getProgress(item);
      if (item.status === '簽署中' && progress === 100) return '已結案';
      if (item.status === '簽署完成') return '已結案';
      if (item.status === '已完成') return '已結案';
      return item.status;
    }

    function formatDateDisplay(value) {
      if (!value) return '—';
      try {
        const d = new Date(value);
        if (isNaN(d.getTime())) return String(value).replace(/-/g, '/');
        const y = d.getFullYear();
        const m = String(d.getMonth() + 1).padStart(2, '0');
        const day = String(d.getDate()).padStart(2, '0');
        const h = String(d.getHours()).padStart(2, '0');
        const min = String(d.getMinutes()).padStart(2, '0');
        return `${y}/${m}/${day} ${h}:${min}`;
      } catch (e) {
        return String(value).replace(/-/g, '/');
      }
    }

    // 篩選與渲染
    function filterCases() {
      const keyword = searchInput.value.trim().toLowerCase();
      const status = statusFilter.value;

      const filtered = casesList.filter(item => {
        const matchKeyword =
          !keyword ||
          item.caseId.toLowerCase().includes(keyword) ||
          item.caseName.toLowerCase().includes(keyword) ||
          item.staffId.toLowerCase().includes(keyword) ||
          item.applicantName.toLowerCase().includes(keyword);

        const currentStatus = getDisplayStatus(item);
        const matchStatus = !status || 
          (status === '已完成' ? ['已完成', '已結案'].includes(currentStatus) : currentStatus === status);

        return matchKeyword && matchStatus;
      });

      renderSummary(filtered);
      renderCases(filtered);
    }

    // 渲染統計卡片
    function renderSummary(list) {
      const totalCases = list.length;
      const totalChild = list.reduce((sum, item) => sum + item.childTasks.length, 0);
      const totalDone = list.reduce((sum, item) => sum + getDoneCount(item), 0);
      const totalPending = totalChild - totalDone;
      const completedCases = list.filter(x => ['簽署完成', '已結案'].includes(getDisplayStatus(x))).length;

      // 計算獨特的起單人數量
      const activeStaff = new Set(list.map(x => x.staffId)).size;

      const cards = [
        {
          label: '系統總案件數',
          value: totalCases,
          note: '全系統中所有同仁發起的案件總量。'
        },
        {
          label: '合約份數 / 簽署人數量',
          value: totalChild,
          note: `待簽署份數：${totalPending} 份`
        },
        {
          label: '已完成簽名',
          value: `${totalDone} 份`,
          note: `整體完成率 ${totalChild ? Math.round(totalDone / totalChild * 100) : 0}%`
        },
        {
          label: '起單同仁總數',
          value: `${activeStaff} 人`,
          note: `系統內已有 ${completedCases} 件合約結案`
        }
      ];

      summaryGrid.innerHTML = cards.map(card => `
        <div class="summary-card">
          <div class="summary-label">${card.label}</div>
          <div class="summary-value">${card.value}</div>
          <div class="summary-note">${card.note}</div>
        </div>
      `).join('');
    }

    // 渲染案件列表 (附帶管理功能)
    function renderCases(list) {
      if (!list.length) {
        caseTableBody.innerHTML = `
          <tr>
            <td colspan="6">
              <div class="empty">系統中查無符合條件的案件。</div>
            </td>
          </tr>
        `;
        return;
      }

      caseTableBody.innerHTML = list.map((item) => {
        const done = getDoneCount(item);
        const pending = getPendingCount(item);
        const progress = getProgress(item);
        const displayStatus = getDisplayStatus(item);

        return `
          <tr>
            <td>
              <div class="case-code">${item.caseId}</div>
              <div class="case-name">${item.caseName}</div>
            </td>
            <td>
              <strong>${item.applicantName}</strong>
              <div class="staff-badge">員編 ${item.staffId}</div>
            </td>
            <td>${formatDateDisplay(item.createdAt)}</td>
            <td><span class="pill ${getStatusClass(displayStatus)}">${displayStatus}</span></td>
            <td>
              <div class="progress-box">
                <div class="progress-top">
                  <span>已簽 ${done}</span>
                  <span>待簽 ${pending}</span>
                </div>
                <div class="progress-bar">
                  <div class="progress-fill" style="width:${progress}%"></div>
                </div>
              </div>
            </td>
            <td>
              <div class="row-actions">
                <button class="mini-btn btn-expand" onclick="toggleChildren('${item.caseId}')">展開</button>
                <button class="mini-btn btn-close-case" onclick="closeCase('${item.caseId}')" ${displayStatus === '已結案' ? 'disabled style="opacity: 0.5; cursor: not-allowed;"' : ''}>結案</button>
                <button class="mini-btn btn-delete-case" onclick="deleteCase('${item.caseId}')">刪除</button>
              </div>
            </td>
          </tr>
          <tr id="child-row-${item.caseId}" class="child-row" style="display:none;">
            <td colspan="6">
              <div class="child-wrap">
                <div class="child-list">
                  ${item.childTasks.map((task, taskIndex) => `
                    <div class="child-item">
                      <div class="child-main">
                        <div class="child-name">${task.signerName || `簽署人 ${taskIndex + 1}`}</div>
                        <div class="child-code">${task.signId}</div>
                      </div>
                      <div class="child-status">
                        <span class="pill ${getChildTaskDisplayStatus(task) === '簽署完成' ? 'done' : 'pending'}">${getChildTaskDisplayStatus(task)}</span>
                      </div>
                      <div class="child-meta">
                        簽署時間：${task.signedAt ? formatDateDisplay(task.signedAt) : '尚未簽署'}
                      </div>
                      <div class="child-actions">
                        <button class="mini-btn" onclick="window.open('${task.signUrl}', '_blank')">前往簽署頁</button>
                        <button class="mini-btn" onclick="copyToClipboard('${task.signUrl}')">複製連結</button>
                        <button class="mini-btn" onclick="downloadSignature('${task.signaturePath}')">查看簽章</button>
                      </div>
                    </div>
                  `).join('')}
                </div>
              </div>
            </td>
          </tr>
        `;
      }).join('');
    }

    // 展開/收合子任務
    function toggleChildren(caseId) {
      const row = document.getElementById(`child-row-${caseId}`);
      if (!row) return;
      row.style.display = row.style.display === 'none' ? 'table-row' : 'none';
    }

    // 手動結案
    async function closeCase(caseId) {
      if (!confirm(`確定要將案件 ${caseId} 強制結案嗎？`)) return;
      try {
        const { error } = await supabase
          .from('cases')
          .update({ status: '已結案' })
          .eq('case_id', caseId);
        
        if (error) throw error;
        showToast(`案件 ${caseId} 已成功結案`);
        await loadCasesFromSupabase();
      } catch (err) {
        console.error(err);
        showToast(`結案失敗: ${err.message}`);
      }
    }

    // 級聯刪除案件
    async function deleteCase(caseId) {
      if (!confirm(`⚠️ 警告！確定要刪除案件 ${caseId} 嗎？\n此動作將一併刪除所有配置欄位及子任務簽署紀錄，且無法還原！`)) return;
      try {
        const { error } = await supabase
          .from('cases')
          .delete()
          .eq('case_id', caseId);
        
        if (error) throw error;
        showToast(`案件 ${caseId} 已成功刪除`);
        await loadCasesFromSupabase();
      } catch (err) {
        console.error(err);
        showToast(`刪除失敗: ${err.message}`);
      }
    }

    // 複製簽署連結到剪貼簿
    function copyToClipboard(text) {
      navigator.clipboard.writeText(text)
        .then(() => showToast('已複製簽署連結'))
        .catch(err => showToast('複製失敗: ' + err));
    }

    // 查看手寫簽章
    function downloadSignature(signaturePathJson) {
      if (!signaturePathJson || signaturePathJson === 'null') {
        showToast('此子任務尚未簽署，無圖檔可供查看。');
        return;
      }
      try {
        const sigs = JSON.parse(signaturePathJson);
        const urls = Object.values(sigs);
        if (urls.length === 0) {
          showToast('未找到簽名圖檔');
          return;
        }
        urls.forEach(url => window.open(url, '_blank'));
      } catch (e) {
        window.open(signaturePathJson, '_blank');
      }
    }

    // 綁定到 window 以利 HTML onclick 呼叫
    window.handleLogout = handleLogout;
    window.goToTaskboard = goToTaskboard;
    window.goToCreateCase = goToCreateCase;
    window.toggleChildren = toggleChildren;
    window.closeCase = closeCase;
    window.deleteCase = deleteCase;
    window.copyToClipboard = copyToClipboard;
    window.downloadSignature = downloadSignature;

    searchInput.addEventListener('input', filterCases);
    statusFilter.addEventListener('change', filterCases);
  </script>
</body>
</html>
